<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="game-container">
        <h1>Rock Paper Scissors</h1>
        
        <!-- Selection Screen -->
        <div id="selectionScreen">
            <p class="instruction">Select your Weapon</p>
            <div class="weapons-container">
                <button class="weapon-btn" id="rock">✊<br>Rock</button>
                <button class="weapon-btn" id="paper">✋<br>Paper</button>
                <button class="weapon-btn" id="scissors">✌️<br>Scissors</button>
            </div>
        </div>

        <!-- Shaking & Match Arena Screen -->
        <div id="matchScreen" class="hidden">
            <div class="arena-headers">
                <span>Player</span>
                <span class="vs">v/s</span>
                <span>Computer</span>
            </div>
            <div class="match-arena">
                <div class="hand player-hand" id="playerHand">✊</div>
                <div class="hand computer-hand" id="computerHand">✊</div>
            </div>
            <div class="result-box">
                <h2 id="statusText">Shaking...</h2>
                <button id="playAgainBtn" class="play-again hidden">🔄 Play Again</button>
            </div>
        </div>

        <!-- Scoreboard -->
        <div class="scoreboard">
            <div class="score-box">Won: <span id="winCount">0</span></div>
            <div class="divider"></div>
            <div class="score-box">Lost: <span id="loseCount">0</span></div>
            <div class="divider"></div>
            <div class="score-box">Draw: <span id="drawCount">0</span></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
