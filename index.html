<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1>Stone Paper Scissors</h1>
        <p class="instruction">Choose your weapon</p>

        <!-- Weapons Layout with correct IDs -->
        <div class="weapons-container">
            <button class="weapon-btn" id="rock">
                <span class="emoji">✊</span>
                <span>Rock</span>
            </button>
            <button class="weapon-btn" id="paper">
                <span class="emoji">✋</span>
                <span>Paper</span>
            </button>
            <button class="weapon-btn" id="scissors">
                <span class="emoji">✌️</span>
                <span>Scissors</span>
            </button>
        </div>

        <!-- Status display for current round -->
        <div class="result-display" id="statusText">
            Click a weapon to start the game!
        </div>

        <!-- Scoreboard layout -->
        <div class="scoreboard">
            <div class="score-box">Won: <span id="winCount">0</span></div>
            <div class="divider"></div>
            <div class="score-box">Lost: <span id="loseCount">0</span></div>
            <div class="divider"></div>
            <div class="score-box">Draw: <span id="drawCount">0</span></div>
        </div>
    </div>

    <!-- JavaScript connected at the very end -->
    <script src="script.js"></script>
</body>
</html>
